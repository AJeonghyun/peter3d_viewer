<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#102c3b" />
  <title>베드로 키우기 — 갈릴리 호숫가</title>
  <link rel="stylesheet" href="/static/world.css" />
</head>
<body>
  <main id="world" aria-label="갈릴리 호숫가의 조별 베드로 월드">
    <div id="scene"></div>

    <header class="topbar glass">
      <div class="brand">
        <span class="brand-mark">153</span>
        <div><strong>베드로 키우기</strong><small>우리의 믿음이 자라는 갈릴리</small></div>
      </div>
      <button id="findTeamBtn" class="primary-button"><span>⌕</span> 우리 조 찾기</button>
    </header>

    <section class="world-hint glass" id="worldHint">
      <span class="touch-icon">☝</span>
      <div><strong>베드로를 터치해보세요</strong><small>조별 성품과 성장 기록을 볼 수 있어요</small></div>
    </section>

    <button id="soundBtn" class="round-button glass" aria-label="배경 소리 켜기">♪</button>

    <aside id="teamPanel" class="team-panel" aria-hidden="true">
      <button id="closePanelBtn" class="panel-close" aria-label="정보 닫기">×</button>
      <div class="panel-eyebrow">OUR PETER</div>
      <div class="team-heading">
        <div id="teamSymbol" class="team-symbol">魚</div>
        <div><h1 id="teamName">1조</h1><p id="teamIdentity">첫걸음을 준비하는 베드로</p></div>
      </div>

      <div class="level-row">
        <div><small>GROWTH LEVEL</small><strong id="teamLevel">10</strong></div>
        <div class="talent"><small>보유 달란트</small><strong><span>✦</span> <b id="teamTalents">0</b></strong></div>
      </div>

      <section class="stats-card">
        <div class="section-title"><span>네 가지 성품</span><small>0 — 100</small></div>
        <div class="radar-wrap">
          <svg id="radar" viewBox="0 0 320 260" role="img" aria-label="용기 현명 진실 열정 성품 차트">
            <g class="radar-grid">
              <polygon points="160,24 276,130 160,236 44,130" />
              <polygon points="160,50.5 247,130 160,209.5 73,130" />
              <polygon points="160,77 218,130 160,183 102,130" />
              <polygon points="160,103.5 189,130 160,156.5 131,130" />
              <line x1="160" y1="24" x2="160" y2="236" />
              <line x1="44" y1="130" x2="276" y2="130" />
            </g>
            <polygon id="radarShape" class="radar-shape" points="160,119 171.6,130 160,140.6 148.4,130" />
            <g id="radarDots" class="radar-dots"></g>
            <g class="radar-labels">
              <text x="160" y="13" text-anchor="middle">용기 <tspan id="courageValue">10</tspan></text>
              <text x="305" y="135" text-anchor="end">현명 <tspan id="wisdomValue">10</tspan></text>
              <text x="160" y="257" text-anchor="middle">진실 <tspan id="faithValue">10</tspan></text>
              <text x="15" y="135">열정 <tspan id="loveValue">10</tspan></text>
            </g>
          </svg>
        </div>
      </section>

      <section class="title-card">
        <span class="title-icon">✦</span>
        <div><small>현재 칭호</small><strong id="teamTitle">첫걸음을 준비하는 자</strong></div>
      </section>

      <details class="history-section">
        <summary>최근 성장 기록 <span>⌄</span></summary>
        <ol id="historyList"><li class="empty-history">아직 기록된 성장이 없습니다</li></ol>
      </details>
    </aside>

    <div id="finder" class="modal-backdrop" aria-hidden="true">
      <section class="finder-card glass" role="dialog" aria-modal="true" aria-labelledby="finderTitle">
        <button id="closeFinderBtn" class="panel-close" aria-label="조 찾기 닫기">×</button>
        <div class="panel-eyebrow">FIND OUR PETER</div>
        <h2 id="finderTitle">우리 조를 선택하세요</h2>
        <p>선택하면 갈릴리에서 우리 조 베드로를 찾아드려요.</p>
        <div id="teamGrid" class="team-grid"></div>
      </section>
    </div>

    <div id="loading" class="loading-screen">
      <div class="fish-loader">◇</div>
      <strong>갈릴리 호숫가를 준비하고 있어요</strong>
      <small id="loadingStatus">베드로들을 불러오는 중…</small>
    </div>

    <div id="toast" class="toast" role="status"></div>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/static/world.js?v=20260716-10"></script>
</body>
</html>
